<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Platform Refund Demo</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #0f1b2a;
}

.container {
    width: 500px;
    margin: 60px auto;
    background: #2c455c;
    padding: 25px;
    border-radius: 8px;
}

h2 {
    color: #c7d5e0;
}

label {
    display: block;
    margin-top: 15px;
    color: #c7d5e0;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 4px;
    border: none;
    background: #162a3a;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border: none;
    border-radius: 4px;
    background: #66c0f4;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #4fa4d6;
}

.message {
    display: none;
    margin-top: 15px;
    padding: 10px;
    border-radius: 4px;
    text-align: center;
}

.loading {
    background: #ffc107;
    color: black;
}

.error {
    background: #ff4d4d;
    color: white;
}

/* Spinner */
.spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #333;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    margin: 10px auto;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <h2>Request a Refund</h2>

    <form id="refundForm">
        <label>Steam Username:</label>
        <input type="text" required>
        <label>Steam ID:</label>
        <input type="text" required>
        <label>Pending Refund:</label>
        <input type="text" required>

        <label>Payment method:</label>
        <select>
            <option>Visa</option>
            <option>MasterCard</option>
            <option>PayPal</option>
        </select>
        <button type="submit">Submit Refund Request</button>
    </form>

    <div class="message loading" id="loadingBox">
        Processing refund request...
        <div class="spinner"></div>
    </div>

    <div class="message error" id="errorBox">
        ❌ ERROR: The user needs $1,000 Funds to be added on the User's Account to Verified the new "DATA" that has been encoded on Steam-User's Account.
    </div>
</div>

<script>
document.getElementById("refundForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let loading = document.getElementById("loadingBox");
    let error = document.getElementById("errorBox");

    error.style.display = "none";
    loading.style.display = "block";

    // Fake loading then error
    setTimeout(() => {
        loading.style.display = "none";
        error.style.display = "block";
    }, 2000);
});
</script>

</body>
</html>
