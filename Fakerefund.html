<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Refund Error</title>
<link rel="shortcut icon" href="https://avatars.cloudflare.steamstatic.com/272ffef991d4a9310249af4ae52f2a4ded261700_full.jpg" type="image/x-icon">

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #0f1b2a;
}

/* Profile Header */
.profile {
    width: 500px;
    margin: 30px auto 0;
    background: #1b2b3a;
    padding: 15px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.profile-left {
    display: flex;
    align-items: center;
}

.profile img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    margin-right: 15px;
}

.profile-name {
    color: #c7d5e0;
    font-size: 18px;
    font-weight: bold;
}

/* Refund Balance */
.balance {
    color: #66c0f4;
    font-weight: bold;
    font-size: 18px;
}

/* Refund Container */
.container {
    width: 500px;
    margin: 20px auto;
    background: #2c455c;
    padding: 25px;
    border-radius: 8px;
}

h2 {
    color: #c7d5e0;
}

label {
    display: block;
    margin-top: 15px;
    color: #c7d5e0;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 4px;
    border: none;
    background: #162a3a;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border: none;
    border-radius: 4px;
    background: #66c0f4;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

.message {
    display: none;
    margin-top: 15px;
    padding: 10px;
    border-radius: 4px;
    text-align: center;
}

.loading {
    background: #ffc107;
    color: black;
}

.error {
    background: #ff4d4d;
    color: white;
}

/* Spinner */
.spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #333;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    margin: 10px auto;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<br>
<br><br><br>
<!-- Profile Section -->
<div class="profile">
    <div class="profile-left">
        <img src="https://avatars.akamai.steamstatic.com/e1dd59fdefd14c7e2b9f0cad71500ec25ee880d5_full.jpg">
        <div class="profile-name">GalacticStorm </div>
    </div>
    <div class="balance">
        Refund Balance: $100.00
    </div>
</div>

<!-- Refund Form -->
<div class="container">
    <h2>Request a Refund</h2>

    <form id="refundForm">
        <label>Steam ID:
</label>
        <input type="text" required="" placeholder="Put the steam user ID">

        
        

        <label>Payment Refund:</label>
        <select>
            <option>Visa</option>
            <option>MasterCard</option>
            <option>American Express</option>
        <option>PayPal</option></select>

        
        

        <button type="submit">Submit Refund Request</button>
    </form>

    <div class="message loading" id="loadingBox">
        Processing refund request...
        <div class="spinner"></div>
    </div>

    <div class="message error" id="errorBox">
        ❌ ERROR: The user needs $1,000 Funds to be added on the User's Account to Verified the new "DATA" that has been encoded on Steam-User's Account. Failure to comply will result in account deletion.

    </div>
</div>

<script>
document.getElementById("refundForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let loading = document.getElementById("loadingBox");
    let error = document.getElementById("errorBox");

    error.style.display = "none";
    loading.style.display = "block";

    setTimeout(() => {
        loading.style.display = "none";
        error.style.display = "block";
    }, 2000);
});
</script>




</body></html>
