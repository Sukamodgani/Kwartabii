<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Password</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to bottom, #1b2838 0%, #171a21 100%);
    color: #c7d5e0;
    scroll-behavior: smooth;
}

/* Header */
.header {
    background: #171a21;
    padding: 15px 40px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #66c0f4;
}

/* Container */
.container {
    width: 500px;
    margin: 60px auto;
    background: #1b2838;
    padding: 30px;
    border-radius: 4px;
    box-shadow: 0 0 20px rgba(0,0,0,0.7);
}

h2 {
    margin-top: 0;
    color: #ffffff;
    border-bottom: 1px solid #2a475e;
    padding-bottom: 10px;
}

/* Output */
.output-box {
    display: flex;
    margin-bottom: 15px;
}

.output-box input {
    flex: 1;
    padding: 10px;
    background: #2a475e;
    border: 1px solid #66c0f4;
    color: white;
    outline: none;
}

.output-box button {
    background: linear-gradient(to bottom, #66c0f4 0%, #417a9b 100%);
    border: none;
    color: white;
    padding: 10px 15px;
    cursor: pointer;
}

.output-box button:hover {
    background: linear-gradient(to bottom, #7fd7ff 0%, #4c91b8 100%);
}

/* Sections */
.section {
    margin-bottom: 20px;
}

.section label {
    display: block;
    margin-bottom: 8px;
    cursor: pointer;
}

input[type="range"] {
    width: 100%;
}

/* Generate Button */
.generate-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to bottom, #66c0f4 0%, #417a9b 100%);
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* Strength Bar */
.strength-bar {
    margin-top: 15px;
    height: 10px;
    background: #2a475e;
}

.strength-fill {
    height: 100%;
    width: 0%;
    transition: 0.3s;
}

/* History */
.history-section {
    margin-top: 25px;
    border-top: 1px solid #2a475e;
    padding-top: 15px;
}

.history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.history-header h3 {
    margin: 0;
    color: #66c0f4;
}

/* Clear Button */
.clear-btn {
    background: #a83232;
    border: none;
    padding: 5px 10px;
    color: white;
    cursor: pointer;
    font-size: 12px;
}

.clear-btn:hover {
    background: #d14444;
}

.history-list {
    margin-top: 10px;
    max-height: 200px;
    overflow-y: auto;
    background: #16202d;
    border: 1px solid #2a475e;
}

.history-item {
    padding: 8px 10px;
    border-bottom: 1px solid #22384d;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
}

.history-time {
    color: #8f98a0;
    font-size: 11px;
}

.history-empty {
    padding: 10px;
    color: #8f98a0;
}

/* Toast */
.steam-toast {
    position: fixed;
    bottom: 25px;
    right: -350px;
    width: 300px;
    background: #1b2838;
    border: 1px solid #2a475e;
    padding: 15px;
    color: #c7d5e0;
    transition: right 0.4s ease, opacity 0.4s ease;
    opacity: 0;
    z-index: 9999;
}

.steam-toast.show {
    right: 25px;
    opacity: 1;
    border: 1px solid #4caf50;
    box-shadow:
        0 0 8px #4caf50,
        0 0 20px rgba(76,175,80,0.6),
        0 0 40px rgba(76,175,80,0.3);
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">GENERATE PASSWORD</div>
</div>

<div class="container">
    <h2>Generate Secure Password</h2>

    <div class="output-box">
        <input type="text" id="password" readonly>
        <button onclick="copyPassword()">Copy</button>
    </div>

    <div class="section">
        <label>Password Length: <span id="lengthValue">12</span></label>
        <input type="range" min="6" max="32" value="12" id="lengthSlider">
    </div>

    <div class="section">
        <label><input type="checkbox" id="uppercase" checked> Include Uppercase</label>
        <label><input type="checkbox" id="lowercase" checked> Include Lowercase</label>
        <label><input type="checkbox" id="numbers" checked> Include Numbers</label>
        <label><input type="checkbox" id="symbols"> Include Symbols</label>
    </div>

    <button class="generate-btn" onclick="generatePassword()">Generate Password</button>

    <div class="strength-bar">
        <div class="strength-fill" id="strengthFill"></div>
    </div>

    <!-- History -->
    <div class="history-section" id="historySection">
        <div class="history-header">
            <h3>Password History</h3>
            <button class="clear-btn" onclick="clearHistory()">Clear History</button>
        </div>
        <div id="historyList" class="history-list"></div>
    </div>
</div>

<!-- Toast -->
<div id="steamToast" class="steam-toast">
    <div class="toast-message">Password copied!</div>
</div>

<script>
const slider = document.getElementById("lengthSlider");
const lengthValue = document.getElementById("lengthValue");
const passwordField = document.getElementById("password");
let passwordHistory = [];

/* Load history on page load */
window.onload = function() {
    const saved = localStorage.getItem("passwordHistory");
    if (saved) {
        passwordHistory = JSON.parse(saved);
        renderHistory();
    } else {
        showEmpty();
    }
};

slider.oninput = () => lengthValue.textContent = slider.value;

function generatePassword() {
    const chars = 
        (uppercase.checked ? "ABCDEFGHIJKLMNOPQRSTUVWXYZ" : "") +
        (lowercase.checked ? "abcdefghijklmnopqrstuvwxyz" : "") +
        (numbers.checked ? "0123456789" : "") +
        (symbols.checked ? "!@#$%^&*()_+{}[]<>?" : "");

    if (!chars) return;

    let password = "";
    for (let i = 0; i < slider.value; i++) {
        password += chars[Math.floor(Math.random() * chars.length)];
    }

    passwordField.value = password;
    checkStrength(password);
}

function copyPassword() {
    if (!passwordField.value) return;

    navigator.clipboard.writeText(passwordField.value);
    addToHistory(passwordField.value);
    showToast("Password copied & saved!");
    document.getElementById("historySection").scrollIntoView({behavior:"smooth"});
}

function addToHistory(password) {
    const time = new Date().toLocaleTimeString();
    passwordHistory.unshift({password, time});
    if (passwordHistory.length > 10) passwordHistory.pop();

    localStorage.setItem("passwordHistory", JSON.stringify(passwordHistory));
    renderHistory();
}

function renderHistory() {
    const list = document.getElementById("historyList");
    list.innerHTML = "";

    if (passwordHistory.length === 0) {
        showEmpty();
        return;
    }

    passwordHistory.forEach(entry => {
        const item = document.createElement("div");
        item.className = "history-item";
        item.innerHTML = `
            <span>${entry.password}</span>
            <span class="history-time">${entry.time}</span>
        `;
        list.appendChild(item);
    });
}

function clearHistory() {
    passwordHistory = [];
    localStorage.removeItem("passwordHistory");
    renderHistory();
    showToast("History cleared!");
}

function showEmpty() {
    const list = document.getElementById("historyList");
    list.innerHTML = "<div class='history-empty'>No passwords copied yet.</div>";
}

function checkStrength(password) {
    let strength = 0;
    if (password.length >= 8) strength++;
    if (password.length >= 12) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;

    const fill = document.getElementById("strengthFill");
    fill.style.width = (strength/5)*100 + "%";

    if (strength <= 2) fill.style.background = "#a83232";
    else if (strength <= 4) fill.style.background = "#e5b100";
    else fill.style.background = "#4caf50";
}

function showToast(message) {
    const toast = document.getElementById("steamToast");
    toast.querySelector(".toast-message").textContent = message;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}
</script>

</body>
</html>
